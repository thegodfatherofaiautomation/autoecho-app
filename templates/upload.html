<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Audio - AutoEcho</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            background-color: #111;
            color: #eee;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }
        input[type="file"] {
            margin: 20px 0;
        }
        button {
            padding: 12px 25px;
            font-size: 16px;
            background-color: #28a745;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
    <h1>Upload Your Audio</h1>
    <p>Welcome back! Just upload your file and we’ll get transcribing in seconds.</p>

    <form action="/transcribe" method="post" enctype="multipart/form-data">
        <input type="file" name="audio_file" accept=".mp3,.wav,.m4a" required><br>
        <select name="tier" required>
            <option value="free">Free</option>
            <option value="basic">Basic</option>
            <option value="standard">Standard</option>
            <option value="premium">Premium</option>
            <option value="enterprise">Enterprise</option>
        </select><br><br>
        <button type="submit">Start Transcription</button>
    </form>
</body>
</html>
