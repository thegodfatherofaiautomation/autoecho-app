<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoEcho - Welcome</title>
  <style>
    body {
      background-color: #121212;
      color: #ffffff;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 40px 20px;
    }

    img {
      margin-bottom: 20px;
    }

    h1 {
      font-size: 2em;
    }

    p {
      margin: 0 auto 30px;
      max-width: 500px;
    }

    .button-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    button {
      background-color: #007BFF;
      color: white;
      padding: 10px 20px;
      font-size: 1em;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #0056b3;
    }

    .dark-toggle {
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <!-- Logo -->
  <div>
    <img src="{{ url_for('static', filename='Logo.png') }}" alt="AutoEcho Logo" width="150">
  </div>

  <!-- Welcome Text -->
  <h1>Welcome to AutoEcho</h1>
  <p>
    AI-powered transcription that just works. Fast, accurate, and built for creators,
    professionals, and anyone tired of manual work.
  </p>

  <!-- Buttons -->
  <div class="button-container">
    <form action="/login_stripe" method="get">
      <button type="submit">Login with Stripe</button>
    </form>

    <form action="/login_paypal" method="get">
      <button type="submit">Login with PayPal</button>
    </form>
  </div>

  <!-- Dark Mode Toggle -->
  <label class="dark-toggle">
    <input type="checkbox" id="darkModeToggle"> Enable Dark Mode
  </label>

  <script>
    // Dark mode toggle
    const toggle = document.getElementById('darkModeToggle');
    const body = document.body;

    // Load saved state
    if (localStorage.getItem('darkMode') === 'enabled') {
      body.style.backgroundColor = '#121212';
      toggle.checked = true;
    }

    toggle.addEventListener('change', function () {
      if (toggle.checked) {
        body.style.backgroundColor = '#121212';
        localStorage.setItem('darkMode', 'enabled');
      } else {
        body.style.backgroundColor = '#ffffff';
        localStorage.setItem('darkMode', 'disabled');
      }
    });
  </script>

</body>
</html>
