<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AutoEcho</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #eee;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        img.logo {
            max-width: 120px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 1.8em;
        }
        p {
            font-size: 1em;
            line-height: 1.4;
        }
        .button-container {
            margin: 30px 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }
        button {
            width: 90%;
            max-width: 300px;
            padding: 14px;
            font-size: 1em;
            background-color: #007bff;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .dark-mode-toggle {
            margin-top: 30px;
            font-size: 0.9em;
        }

        /* Responsive Design */
        @media screen and (max-width: 600px) {
            h1 {
                font-size: 1.5em;
            }
            button {
                font-size: 0.95em;
            }
        }
    </style>
</head>
<body>
    <img src="{{ url_for('static', filename='Logo.png') }}" alt="AutoEcho Logo" class="logo">

    <h1>Welcome to AutoEcho</h1>
    <p>
        AI-powered transcription that just works.<br>
        Fast, accurate, and built for creators, professionals, and anyone tired of manual work.
    </p>

    <div class="button-container">
        <a href="/login/stripe"><button>Login with Stripe</button></a>
        <a href="/upload"><button>Upload without login</button></a>
    </div>

    <div class="dark-mode-toggle">
        <label>
            <input type="checkbox" id="darkModeToggle">
            Enable Dark Mode
        </label>
    </div>

    <script>
        const toggle = document.getElementById("darkModeToggle");
        const isDark = localStorage.getItem("darkMode") === "true";

        function applyTheme(enabled) {
            document.body.style.backgroundColor = enabled ? "#111" : "#fff";
            document.body.style.color = enabled ? "#eee" : "#000";
        }

        if (isDark) {
            toggle.checked = true;
            applyTheme(true);
        }

        toggle.addEventListener("change", () => {
            const enabled = toggle.checked;
            localStorage.setItem("darkMode", enabled);
            applyTheme(enabled);
        });
    </script>
</body>
</html>
