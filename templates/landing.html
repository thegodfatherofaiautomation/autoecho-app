<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AutoEcho</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #eee;
            text-align: center;
            margin-top: 50px;
        }
        .button-container {
            margin: 30px 0;
        }
        button {
            padding: 12px 25px;
            margin: 10px;
            font-size: 16px;
            background-color: #007bff;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        img.logo {
            max-width: 150px;
            margin-bottom: 20px;
        }
        .dark-mode-toggle {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <!-- Logo must match the exact file name -->
    <img src="{{ url_for('static', filename='Logo.png') }}" alt="AutoEcho Logo" style="width: 100px; margin-bottom: 20px;">

    <h1>Welcome to AutoEcho</h1>
    <p>
        AI-powered transcription that just works.<br>
        Fast, accurate, and built for creators, professionals, and anyone tired of manual work.
    </p>

    <div class="button-container">
        <a href="/login/stripe"><button>Login with Stripe</button></a>
        <!-- PayPal removed -->
    </div>

    <div class="dark-mode-toggle">
        <label>
            <input type="checkbox" id="darkModeToggle">
            Enable Dark Mode
        </label>
    </div>

    <script>
        const toggle = document.getElementById("darkModeToggle");
        const isDark = localStorage.getItem("darkMode") === "true";

        function applyTheme(enabled) {
            document.body.style.backgroundColor = enabled ? "#111" : "#fff";
            document.body.style.color = enabled ? "#eee" : "#000";
        }

        if (isDark) {
            toggle.checked = true;
            applyTheme(true);
        }

        toggle.addEventListener("change", () => {
            const enabled = toggle.checked;
            localStorage.setItem("darkMode", enabled);
            applyTheme(enabled);
        });
    </script>
</body>
</html>
